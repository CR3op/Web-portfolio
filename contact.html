<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Get in touch with Carlos Roldan">
        <meta name="robots" content="noindex, nofollow">
        <title>Contact - Carlos Roldan</title>
        <script>
            (function () {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <style>
            .contact-header {
                position: relative;
                padding: 5rem 2rem 3rem;
                text-align: center;
                background-color: var(--bg-primary);
                box-shadow: 0 2px 0 var(--p5-red);
            }

            .contact-header h1 {
                font-family: var(--p5-font-display);
                font-size: 3rem;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--text-primary);
                margin: 0 0 0.5rem;
            }

            .contact-header .subtitle {
                color: var(--text-secondary);
                font-size: 1.15rem;
                margin: 0;
            }

            .header-actions {
                position: absolute;
                top: 1.5rem;
                right: 2rem;
                display: flex;
                align-items: center;
                gap: 0.85rem;
                z-index: 10;
            }

            .home-button {
                padding: 0.7rem 1.6rem;
                font-size: 0.95rem;
            }

            .contact-wrapper {
                max-width: 640px;
                margin: 3rem auto;
                padding: 0 1.5rem;
            }

            .contact-card {
                position: relative;
                isolation: isolate;
                background: var(--card-bg);
                color: var(--text-primary);
                clip-path: var(--p5-cut-md);
                padding: 2.5rem;
                box-shadow: 8px 8px 0 var(--p5-red-dark);
            }

            .field {
                margin-bottom: 1.5rem;
                text-align: left;
            }

            .field label {
                display: block;
                font-family: var(--p5-font-display);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-size: 0.95rem;
                margin-bottom: 0.5rem;
                color: var(--text-primary);
            }

            .field input,
            .field textarea {
                width: 100%;
                padding: 0.85rem 1rem;
                background: var(--bg-primary);
                color: var(--text-primary);
                border: 2px solid var(--border-color);
                border-radius: 0;
                clip-path: var(--p5-cut-sm);
                font-family: 'Inter', sans-serif;
                font-size: 1rem;
                transition: border-color 0.25s var(--p5-snap);
            }

            .field input:focus,
            .field textarea:focus {
                outline: none;
                border-color: var(--p5-red);
            }

            .field textarea {
                resize: vertical;
                min-height: 140px;
            }

            .field .char-count {
                display: block;
                text-align: right;
                font-size: 0.8rem;
                color: var(--text-secondary);
                margin-top: 0.35rem;
            }

            /* Honeypot — hidden from real users, only bots fill it */
            .hp-field {
                position: absolute;
                left: -9999px;
                top: -9999px;
                width: 1px;
                height: 1px;
                overflow: hidden;
                opacity: 0;
            }

            .captcha-row {
                display: flex;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .captcha-row .captcha-question {
                font-family: var(--p5-font-display);
                font-size: 1.1rem;
                letter-spacing: 0.05em;
                white-space: nowrap;
            }

            .captcha-row input {
                max-width: 120px;
            }

            .submit-btn {
                width: 100%;
                padding: 1rem 2rem;
                font-size: 1rem;
                cursor: pointer;
                margin-top: 0.5rem;
            }

            .form-message {
                margin-top: 1.25rem;
                padding: 0.9rem 1rem;
                font-size: 0.95rem;
                clip-path: var(--p5-cut-sm);
                display: none;
            }

            .form-message.error {
                display: block;
                background: var(--p5-red);
                color: var(--p5-white);
            }

            .form-message.success {
                display: block;
                background: #1a7f37;
                color: var(--p5-white);
            }

            .security-note {
                display: flex;
                align-items: flex-start;
                gap: 0.6rem;
                margin-top: 1.5rem;
                font-size: 0.85rem;
                color: var(--text-secondary);
                text-align: left;
            }

            .security-note svg {
                flex-shrink: 0;
                color: var(--p5-red);
                margin-top: 2px;
            }

            @media (max-width: 640px) {
                .contact-header { padding: 6rem 1rem 2rem; }
                .contact-header h1 { font-size: 2rem; }
                .header-actions { top: 1rem; right: 1rem; gap: 0.5rem; }
                .home-button { padding: 0.5rem 1.1rem; font-size: 0.85rem; }
                .contact-card { padding: 1.5rem; }
            }
        </style>
    </head>
    <body>
        <header class="contact-header">
            <div class="header-actions">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <a href="index.html" class="cta-button home-button">Home</a>
            </div>
            <h1>Say Hello</h1>
            <p class="subtitle">Got a question or an opportunity? Drop me a message.</p>
        </header>

        <section>
            <div class="contact-wrapper">
                <div class="contact-card">
                    <form id="contact-form" novalidate>
                        <div class="field">
                            <label for="name">Name <span aria-hidden="true">(optional)</span></label>
                            <input type="text" id="name" name="name" autocomplete="name" maxlength="80" placeholder="Your name">
                        </div>

                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" autocomplete="email" maxlength="120" placeholder="you@example.com" required>
                        </div>

                        <div class="field">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" maxlength="2000" placeholder="Write your message here. Links and URLs are not allowed." required></textarea>
                            <span class="char-count" id="char-count">0 / 2000</span>
                        </div>

                        <!-- Honeypot: invisible to humans. If filled, the submission is a bot. -->
                        <div class="hp-field" aria-hidden="true">
                            <label for="website">Website (leave this empty)</label>
                            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                        </div>

                        <!-- Math captcha: used as a fallback when no Turnstile site key is set -->
                        <div class="field" id="captcha-field">
                            <label for="captcha">Human check</label>
                            <div class="captcha-row">
                                <span class="captcha-question" id="captcha-question">What is 3 + 4?</span>
                                <input type="text" id="captcha" name="captcha" inputmode="numeric" autocomplete="off" maxlength="4">
                            </div>
                        </div>

                        <!-- Cloudflare Turnstile: shown automatically when a site key is configured in contact.js -->
                        <div class="field" id="turnstile-field" style="display: none;">
                            <label>Human check</label>
                            <div id="turnstile-widget"></div>
                        </div>

                        <button type="submit" class="cta-button submit-btn">Send Message</button>

                        <div class="form-message" id="form-message" role="alert" aria-live="polite"></div>
                    </form>

                    <p class="security-note">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <span>This form blocks links, automated bots, and spam. Messages containing URLs will be rejected to keep things safe.</span>
                    </p>
                </div>
            </div>
        </section>

        <footer>
            <div class="container">
                <p>&copy; <script>document.write(new Date().getFullYear())</script> Carlos Roldan. All rights reserved.</p>
            </div>
        </footer>

        <script src="script.js"></script>
        <script src="contact.js"></script>
        <!-- Cloudflare Turnstile API. The onload callback is defined in contact.js. -->
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
    </body>
</html>
